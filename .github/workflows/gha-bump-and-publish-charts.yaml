name: Bump and Publish GHA Helm Charts

on:
  workflow_dispatch:
    inputs:
      new_version:
        description: 'New version number (e.g. 0.10.2)'
        required: true
        type: string
        default: 0.10.2 # test
      ref:
        description: 'The branch, tag or SHA to cut a release from'
        required: false
        type: string
        default: ''
      push_to_registries:
        description: 'Push images to registries'
        required: true
        type: boolean
        default: false
  # test
  pull_request:
    branches:
      - master

permissions:
  contents: write
  packages: write

env:
  HELM_VERSION: v3.8.0

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      # - name: Validate version format
      #   run: |
      #     VERSION="${{ inputs.new_version }}"
      #     if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
      #       echo "Invalid version format. Must be in format X.Y.Z"
      #       exit 1
      #     fi

  update-chart-versions:
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Update chart versions
        run: |
          # Update gha-runner-scale-set-controller Chart.yaml
          sed -i "s/^version: .*/version: ${{ inputs.new_version }}/" charts/gha-runner-scale-set-controller/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${{ inputs.new_version }}\"/" charts/gha-runner-scale-set-controller/Chart.yaml
          
          # Update gha-runner-scale-set Chart.yaml
          sed -i "s/^version: .*/version: ${{ inputs.new_version }}/" charts/gha-runner-scale-set/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${{ inputs.new_version }}\"/" charts/gha-runner-scale-set/Chart.yaml

      - name: Verify versions match
        run: ./hack/check-gh-chart-versions.sh ${{ github.event.inputs.new_version }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore: bump chart versions to ${{ inputs.new_version }}"
          commit-message: "chore: bump chart versions to ${{ inputs.new_version }}"
          branch: "bump-chart-version-${{ inputs.new_version }}"
          body: |
            Automated PR to bump chart versions:
            - gha-runner-scale-set-controller: ${{ inputs.new_version }}
            - gha-runner-scale-set: ${{ inputs.new_version }}
            
            Please review and merge to trigger chart publishing.

  trigger-publish:
    needs: update-chart-versions
    runs-on: ubuntu-latest
    steps:
      - name: Trigger publish workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'gha-publish-chart.yaml',
              ref: 'master',
              inputs: {
                ref: '',
                release_tag_name: '${{ inputs.new_version }}',
                push_to_registries: '${{ inputs.push_to_registries }}',
                publish_gha_runner_scale_set_controller_chart: 'true',
                publish_gha_runner_scale_set_chart: 'true'
              }
            }); 
