name: Publish Helm Charts on Push to Main

on:
  push:
    branches:
      - master
    paths:
      - 'charts/gha-runner-scale-set/**'
      - 'charts/gha-runner-scale-set-controller/**'
      - '!**.md'
  # test
  pull_request:
    branches:
      - master

env:
  HELM_VERSION: v3.8.0
  # For an auto release you might default to "canary" or derive the release tag from the commit or tag.
  RELEASE_TAG: canary

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  # Previous step: lint charts to catch errors before building and publishing.
  lint-charts:
    name: Lint Helm Charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Lint Controller Chart
        run: helm lint charts/gha-runner-scale-set-controller/

      - name: Lint Runner Scale Set Chart
        run: helm lint charts/gha-runner-scale-set/

  build-push-image:
    name: Build and Push Controller Image
    runs-on: ubuntu-latest
    needs: lint-charts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # - name: Check chart versions
        # Binary version and chart versions need to match.
        # In case of an upgrade, the controller will try to clean up
        # resources with older versions that should have been cleaned up
        # during the upgrade process
      #  run: ./hack/check-gh-chart-versions.sh ${{ env.RELEASE_TAG }}

      - name: Resolve parameters
        id: resolve_parameters
        run: |
          # For auto-deploy, use the current commit SHA.
          resolved_ref="${GITHUB_SHA}"
          echo "resolved_ref=$resolved_ref" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short $resolved_ref)" >> $GITHUB_OUTPUT
          echo "repository_owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: v0.9.1
          driver-opts: image=moby/buildkit:v0.10.6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Controller Image
        uses: docker/build-push-action@v5
        with:
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ env.RELEASE_TAG }}
          push: true
          tags: |
            ghcr.io/${{ steps.resolve_parameters.outputs.repository_owner }}/gha-runner-scale-set-controller:${{ env.RELEASE_TAG }}
            ghcr.io/${{ steps.resolve_parameters.outputs.repository_owner }}/gha-runner-scale-set-controller:${{ env.RELEASE_TAG }}-${{ steps.resolve_parameters.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Summary
        run: |
          echo "Image build and push completed!"
          echo "**Parameters:**"
          echo "- Ref: ${{ steps.resolve_parameters.outputs.resolved_ref }}"
          echo "- Short SHA: ${{ steps.resolve_parameters.outputs.short_sha }}"
          echo "- Release tag: ${{ env.RELEASE_TAG }}"

  publish-helm-chart-gha-runner-scale-set-controller:
    name: Publish Helm Chart for gha-runner-scale-set-controller
    runs-on: ubuntu-latest
    needs: build-push-image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve parameters
        id: resolve_parameters
        run: |
          resolved_ref="${GITHUB_SHA}"
          echo "resolved_ref=$resolved_ref" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short $resolved_ref)" >> $GITHUB_OUTPUT
          echo "repository_owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Publish Controller Helm Chart
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin
          CHART_VERSION=$(grep '^version:' charts/gha-runner-scale-set-controller/Chart.yaml | awk '{print $2}')
          helm package charts/gha-runner-scale-set-controller/ --version "$CHART_VERSION"
          helm push gha-runner-scale-set-controller-"$CHART_VERSION".tgz oci://ghcr.io/${{ steps.resolve_parameters.outputs.repository_owner }}/actions-runner-controller-charts

      - name: Job Summary
        run: |
          echo "Helm chart for gha-runner-scale-set-controller published successfully!"
          echo "**Parameters:**"
          echo "- Ref: ${{ steps.resolve_parameters.outputs.resolved_ref }}"
          echo "- Short SHA: ${{ steps.resolve_parameters.outputs.short_sha }}"
          echo "- Chart version: $CHART_VERSION"

  publish-helm-chart-gha-runner-scale-set:
    name: Publish Helm Chart for gha-runner-scale-set
    runs-on: ubuntu-latest
    needs: build-push-image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve parameters
        id: resolve_parameters
        run: |
          resolved_ref="${GITHUB_SHA}"
          echo "resolved_ref=$resolved_ref" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short $resolved_ref)" >> $GITHUB_OUTPUT
          echo "repository_owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Publish Runner Scale Set Helm Chart
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin
          CHART_VERSION=$(grep '^version:' charts/gha-runner-scale-set/Chart.yaml | awk '{print $2}')
          helm package charts/gha-runner-scale-set/ --version "$CHART_VERSION"
          helm push gha-runner-scale-set-"$CHART_VERSION".tgz oci://ghcr.io/${{ steps.resolve_parameters.outputs.repository_owner }}/actions-runner-controller-charts

      - name: Job Summary
        run: |
          echo "Helm chart for gha-runner-scale-set published successfully!"
          echo "**Parameters:**"
          echo "- Ref: ${{ steps.resolve_parameters.outputs.resolved_ref }}"
          echo "- Short SHA: ${{ steps.resolve_parameters.outputs.short_sha }}"
          echo "- Chart version: $CHART_VERSION"

  # Next step: post-deployment notifications or integration tests can be added here.
  post-deployment:
    name: Post Deployment Notification
    runs-on: ubuntu-latest
    needs:
      - publish-helm-chart-gha-runner-scale-set-controller
      - publish-helm-chart-gha-runner-scale-set
    steps:
      - name: Notify Success
        run: |
          echo "Deployment complete: Container image built and Helm charts published successfully!"
          # Here you could also add steps to send a Slack message, update a status page, etc.
